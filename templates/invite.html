<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Uitnodiging aanvaarden — {{ app_name }}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
  <style>
    body { display:flex; align-items:center; justify-content:center; min-height:100vh; background:var(--bg); }
    .invite-card { background:var(--surface); border:1px solid var(--border); border-radius:12px; box-shadow:var(--shadow-md); padding:40px 48px; width:100%; max-width:440px; }
    .invite-logo { display:flex; flex-direction:column; align-items:center; margin-bottom:28px; gap:6px; }
    .invite-logo svg { width:80px; }
    .invite-logo-name { font-size:18px; font-weight:700; color:var(--text); }
    .invite-header { font-size:16px; font-weight:600; color:var(--text); margin-bottom:6px; }
    .invite-sub { font-size:13px; color:var(--text-dim); margin-bottom:24px; }
  </style>
</head>
<body>
<div class="invite-card">
  <div class="invite-logo">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1680.1 1562.85">
      <path d="M247.53,373.09s-527.82,598.06,103.37,1189.76c0,0-510.95-483.17-103.37-1189.76" fill="#f28c00"/>
      <path d="M0,0s650.07,462.23,170.1,1182.06c0,0,387.56-586.78-170.1-1182.06" fill="#f28c00"/>
      <path d="M297.28,252.59c2.13,18.39,18.75,31.57,37.16,29.48,18.35-2.12,31.55-18.74,29.42-37.13-2.11-18.41-18.73-31.57-37.12-29.44-18.39,2.11-31.57,18.7-29.46,37.09" fill="#f28c00"/>
    </svg>
    <span class="invite-logo-name">{{ app_name }}</span>
  </div>

  {% with messages = get_flashed_messages(with_categories=true) %}
    {% for cat, msg in messages %}
      <div class="alert alert-{{ 'warning' if cat == 'error' else cat }}" style="margin-bottom:16px;">
        <span>{{ msg }}</span>
      </div>
    {% endfor %}
  {% endwith %}

  <p class="invite-header">Welkom bij {{ tenant.name }}</p>
  <p class="invite-sub">
    U bent uitgenodigd als <strong>{{ invite.role }}</strong> voor <strong>{{ tenant.name }}</strong>
    via {{ invite.email }}. Maak hieronder uw account aan.
  </p>

  <form method="post">
    <div class="form-group">
      <label class="form-label">Volledige naam</label>
      <input type="text" name="full_name" autofocus required
             style="font-size:15px;padding:10px 14px;"
             placeholder="Uw naam">
    </div>
    <div class="form-group" style="margin-top:12px;">
      <label class="form-label">Wachtwoord <span style="color:var(--text-dim);font-weight:400;">(min. 8 tekens)</span></label>
      <input type="password" name="password" required
             style="font-size:15px;padding:10px 14px;"
             placeholder="Kies een wachtwoord">
    </div>
    <div class="form-group" style="margin-top:12px;">
      <label class="form-label">Herhaal wachtwoord</label>
      <input type="password" name="password2" required
             style="font-size:15px;padding:10px 14px;"
             placeholder="Wachtwoord herhalen">
    </div>
    <button type="submit" class="btn btn-primary" style="width:100%;margin-top:20px;font-size:15px;padding:12px;">
      Account aanmaken →
    </button>
  </form>
</div>
</body>
</html>
