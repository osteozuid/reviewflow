<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Inloggen — {{ app_name }}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
  <style>
    body { display:flex; align-items:center; justify-content:center; min-height:100vh; background:var(--bg); }
    .login-card { background:var(--surface); border:1px solid var(--border); border-radius:12px; box-shadow:var(--shadow-md); padding:40px 48px; width:100%; max-width:400px; }
    .login-logo { display:flex; flex-direction:column; align-items:center; margin-bottom:32px; gap:8px; }
    .login-logo svg { width:100px; }
    .login-logo-name { font-size:20px; font-weight:700; color:var(--text); letter-spacing:-0.5px; }
    .login-logo-sub { font-size:12px; color:var(--text-dim); }
    .login-title { font-size:18px; font-weight:600; color:var(--text); margin-bottom:24px; text-align:center; }
  </style>
</head>
<body>
<div class="login-card">
  <div class="login-logo">

    <span class="login-logo-name">{{ app_name }}</span>
    <span class="login-logo-sub">Review management voor zorgpraktijken</span>
  </div>

  {% with messages = get_flashed_messages(with_categories=true) %}
    {% for cat, msg in messages %}
      <div class="alert alert-{{ 'warning' if cat == 'error' else cat }}" style="margin-bottom:16px;">
        <span>{{ msg }}</span>
      </div>
    {% endfor %}
  {% endwith %}

  <form method="post">
    <div class="form-group">
      <label class="form-label">E-mailadres</label>
      <input type="email" name="email" autofocus
             style="font-size:15px; padding:10px 14px;"
             placeholder="uw@email.com" required>
    </div>
    <div class="form-group" style="margin-top:12px;">
      <label class="form-label">Wachtwoord</label>
      <input type="password" name="password"
             style="font-size:15px; padding:10px 14px;"
             placeholder="Wachtwoord" required>
    </div>
    <button type="submit" class="btn btn-primary w-full btn-lg" style="width:100%; margin-top:16px;">
      Inloggen →
    </button>
  </form>
</div>
</body>
</html>
