<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Inloggen — ReviewFlow</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
  <style>
    body { display:flex; align-items:center; justify-content:center; min-height:100vh; background:var(--bg); }
    .login-card { background:var(--surface); border:1px solid var(--border); border-radius:12px; box-shadow:var(--shadow-md); padding:40px 48px; width:100%; max-width:400px; }
    .login-logo { display:flex; flex-direction:column; align-items:center; margin-bottom:32px; gap:8px; }
    .login-logo svg { width:100px; }
    .login-logo-name { font-size:20px; font-weight:700; color:var(--text); letter-spacing:-0.5px; }
    .login-logo-sub { font-size:12px; color:var(--text-dim); }
    .login-title { font-size:18px; font-weight:600; color:var(--text); margin-bottom:24px; text-align:center; }
  </style>
</head>
<body>
<div class="login-card">
  <div class="login-logo">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1680.1 1562.85">
      <path d="M247.53,373.09s-527.82,598.06,103.37,1189.76c0,0-510.95-483.17-103.37-1189.76" fill="#f28c00"/>
      <path d="M0,0s650.07,462.23,170.1,1182.06c0,0,387.56-586.78-170.1-1182.06" fill="#f28c00"/>
      <path d="M297.28,252.59c2.13,18.39,18.75,31.57,37.16,29.48,18.35-2.12,31.55-18.74,29.42-37.13-2.11-18.41-18.73-31.57-37.12-29.44-18.39,2.11-31.57,18.7-29.46,37.09" fill="#f28c00"/>
      <path d="M439.88,523.11c0-37.11,22.77-54.83,58.2-54.83s58.23,17.72,58.23,54.83v320.58c0,32.9-22.8,54.81-58.23,54.81s-58.2-21.91-58.2-54.81v-320.58M470.27,843.7c0,15.99,8.39,29.51,27.82,29.51,21.07,0,27.84-13.52,27.84-29.51v-320.58c0-17.73-6.77-29.54-27.84-29.54-19.42,0-27.82,11.81-27.82,29.54v320.58Z" fill="#374151"/>
      <path d="M629.65,754.24v93.65c0,16.87,10.16,25.31,25.32,25.31,14.32,0,24.46-8.44,24.46-25.31v-72.56c0-22.76-.82-38.79-10.14-53.99l-49.77-81.84-9.26-16.03c-8.44-15.16-10.99-27.82-10.99-48.04v-59.93c0-26.13,17.74-47.22,54.88-47.22s53.98,17.72,53.98,48.91v73.41h-30.36v-68.35c0-16.87-5.95-28.68-23.62-28.68-18.58,0-24.51,11.81-24.51,28.68v57.38c0,14.34,2.53,27.82,11.83,42.15l15.18,25.33,39.65,62.42c10.12,16.87,13.5,32.92,13.5,54.83v84.37c0,30.37-20.27,49.77-56.52,49.77-32.05,0-54.01-16.03-54.01-44.7v-99.56h30.37" fill="#374151"/>
      <path d="M731.74,471.66h26.15v-75.09l30.37-16.89v91.99h37.11v25.29h-37.11v352.64c0,16.87,6.75,23.62,17.73,23.62h19.38v25.3h-25.3c-27,0-42.18-10.12-42.18-41.35v-360.21h-26.15v-25.29" fill="#374151"/>
    </svg>
    <span class="login-logo-name">ReviewFlow</span>
    <span class="login-logo-sub">Osteozuid</span>
  </div>

  {% with messages = get_flashed_messages(with_categories=true) %}
    {% for cat, msg in messages %}
      <div class="alert alert-{{ 'warning' if cat == 'error' else cat }}" style="margin-bottom:16px;">
        <span>{{ msg }}</span>
      </div>
    {% endfor %}
  {% endwith %}

  <form method="post">
    <div class="form-group">
      <label class="form-label">Wachtwoord</label>
      <input type="password" name="password" autofocus
             style="font-size:15px; padding:10px 14px;"
             placeholder="Voer uw wachtwoord in" required>
    </div>
    <button type="submit" class="btn btn-primary w-full btn-lg" style="width:100%; margin-top:8px;">
      Inloggen →
    </button>
  </form>
</div>
</body>
</html>
